<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Topology AI | Premium Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #ffffff; --bg: #050505; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Space Grotesk', sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        #canvas-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        /* */
        .interface {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 60px;
            pointer-events: none;
        }

        .header { display: flex; justify-content: space-between; align-items: center; pointer-events: auto; }
        .logo { font-weight: 700; letter-spacing: 10px; font-size: 14px; color: var(--accent); }

        .center-hero { max-width: 800px; }
        h1 {
            font-size: clamp(3rem, 10vw, 8rem);
            font-weight: 300;
            line-height: 0.9;
            letter-spacing: -5px;
            margin-bottom: 20px;
        }
        h1 span { font-weight: 700; opacity: 0.2; }

        .description {
            font-size: 14px;
            max-width: 400px;
            line-height: 1.6;
            opacity: 0.5;
            letter-spacing: 1px;
        }

        .action-area {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            pointer-events: auto;
        }

        .price-box {
            border-left: 1px solid rgba(255,255,255,0.2);
            padding-left: 20px;
        }

        .btn-buy {
            background: #fff;
            color: #000;
            padding: 20px 50px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            transition: 0.4s ease;
        }
        .btn-buy:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(255,255,255,0.2); }

    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="interface">
        <div class="header">
            <div class="logo">TOPOLOGY.AI</div>
            <div style="font-size: 10px; opacity: 0.4; letter-spacing: 2px;">SECURE_ACCESS: GRANTED</div>
        </div>

        <div class="center-hero">
            <h1>LIQUID<br><span>INTELLIGENCE</span></h1>
            <p class="description">Bespoke 3D data environments engineered for high-performance AI frameworks. Minimalist. Fluid. Precise.</p>
        </div>

        <div class="action-area">
            <div class="price-box">
                <p style="font-size: 10px; opacity: 0.4; margin-bottom: 5px;">ENTERPRISE LICENSE</p>
                <p style="font-size: 24px; font-weight: 700;">$8,200.00</p>
            </div>
            <button class="btn-buy">Inquire Now</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, plane;
        let mouse = { x: 0, y: 0 };

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 2, 5);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            
            const geometry = new THREE.PlaneGeometry(15, 15, 60, 60);
            const material = new THREE.MeshBasicMaterial({
                color: 0xffffff,
                wireframe: true,
                transparent: true,
                opacity: 0.15
            });

            plane = new THREE.Mesh(geometry, material);
            plane.rotation.x = -Math.PI / 2.5;
            scene.add(plane);

            window.addEventListener('resize', onWindowResize);
            document.addEventListener('mousemove', (e) => {
                mouse.x = (e.clientX / window.innerWidth) - 0.5;
                mouse.y = (e.clientY / window.innerHeight) - 0.5;
            });

            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            const positions = plane.geometry.attributes.position.array;
            const time = Date.now() * 0.0005;

            for (let i = 0; i < positions.length; i += 3) {
                const x = positions[i];
                const y = positions[i + 1];
                // 
                positions[i + 2] = Math.sin(x * 1.0 + time + mouse.x * 5) * 0.5 + 
                                   Math.cos(y * 1.0 + time + mouse.y * 5) * 0.5;
            }
            plane.geometry.attributes.position.needsUpdate = true;
            
            plane.rotation.z += 0.001;

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
